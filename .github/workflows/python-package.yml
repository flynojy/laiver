name: Project checks

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  api:
    name: API checks / Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install API dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e "apps/api[dev]"

      - name: Lint API
        run: python -m ruff check apps/api --select E9,F63,F7,F82

      - name: Test API
        run: python -m unittest discover -s apps/api/tests -p "test_*.py"

  web:
    name: Web checks
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install web dependencies
        run: npm ci

      - name: Typecheck web
        run: npm run typecheck:web

      - name: Build web
        run: npm run build:web
